<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{date}} &mdash; logs.gokuls.in</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1><a href="/">logs.gokuls.in</a></h1>
    </header>
    <nav class="entry-nav">
        {{prev_link}}
        <a href="/">all entries</a>
        {{next_link}}
    </nav>
    <main>
        <article>
            <h2 class="entry-date">{{date_display}}</h2>
            <p class="entry-summary">{{pr_count}} pull request{{pr_plural}} merged across {{repo_count}} repo{{repo_plural}}</p>
            {{repo_sections}}
        </article>
    </main>
    <footer>
        <p>auto-generated daily from public GitHub activity &middot; <a href="https://github.com/bahdotsh/logs">source</a></p>
    </footer>
    <script>
    (function() {
        // Repo filter from query param
        var params = new URLSearchParams(window.location.search);
        var repo = params.get('repo');
        if (repo) {
            var visiblePRs = 0;
            document.querySelectorAll('.repo-section').forEach(function(section) {
                if (section.dataset.repo !== repo) {
                    section.style.display = 'none';
                } else {
                    visiblePRs += section.querySelectorAll('.pr-item').length;
                }
            });
            var summary = document.querySelector('.entry-summary');
            if (summary) {
                summary.innerHTML = visiblePRs + ' pull request' + (visiblePRs !== 1 ? 's' : '') +
                    ' in <strong>' + repo + '</strong>' +
                    ' <a href="' + window.location.pathname + '" style="font-size:0.75rem;margin-left:0.3rem;">(show all)</a>';
            }
        }

        // Read-more toggle for long PR bodies
        document.querySelectorAll('.pr-body').forEach(function(body) {
            if (body.scrollHeight > body.clientHeight + 1) {
                var btn = document.createElement('button');
                btn.className = 'read-more-btn';
                btn.textContent = 'read more...';
                btn.addEventListener('click', function() {
                    body.classList.toggle('expanded');
                    btn.textContent = body.classList.contains('expanded') ? 'show less' : 'read more...';
                });
                body.parentNode.insertBefore(btn, body.nextSibling);
            }
        });
    })();
    </script>
</body>
</html>
