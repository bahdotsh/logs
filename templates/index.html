<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logs.gokuls.in</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="/"><img src="logo.svg" alt="logs" class="logo">logs.gokuls.in</a></h1>
    </header>
    {{repo_filter}}
    <main>
        {{entries}}
    </main>
    <footer>
        <p>auto-generated daily from public GitHub activity &middot; <a href="https://github.com/bahdotsh/logs">source</a></p>
    </footer>
    <script>
    (function() {
        if (typeof REPO_DATA === 'undefined') return;
        var input = document.getElementById('filterInput');
        var dropdown = document.getElementById('filterDropdown');
        var clearBtn = document.getElementById('filterClear');
        var countEl = document.getElementById('filterCount');
        var filterWrap = document.getElementById('repoFilter');
        var activeRepo = 'all';
        var isOpen = false;

        function groupByOwner(repos) {
            var groups = {};
            repos.forEach(function(r) {
                var owner = r.name.split('/')[0];
                if (!groups[owner]) groups[owner] = [];
                groups[owner].push(r);
            });
            return groups;
        }

        function renderDropdown(filter) {
            var q = (filter || '').toLowerCase();
            var filtered = q
                ? REPO_DATA.filter(function(r) { return r.name.toLowerCase().includes(q); })
                : REPO_DATA;
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div class="filter-empty">No matching repos</div>';
                showDropdown();
                return;
            }
            var groups = groupByOwner(filtered);
            var ownerKeys = Object.keys(groups).sort();
            var multiOwner = ownerKeys.length > 1;
            var html = '<button class="filter-option filter-option-all' +
                (activeRepo === 'all' ? ' active' : '') +
                '" data-repo="all">All repositories<span class="filter-option-count">' +
                REPO_DATA.length + '</span></button>';
            ownerKeys.forEach(function(owner) {
                if (multiOwner) {
                    html += '<div class="filter-group-label">' + owner + '</div>';
                }
                groups[owner].forEach(function(repo) {
                    var cls = repo.name === activeRepo ? ' active' : '';
                    html += '<button class="filter-option' + cls + '" data-repo="' +
                        repo.name + '"><span class="filter-option-name">' + repo.name +
                        '</span><span class="filter-option-count">' + repo.count +
                        '</span></button>';
                });
            });
            dropdown.innerHTML = html;
            showDropdown();
            dropdown.querySelectorAll('.filter-option').forEach(function(opt) {
                opt.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    selectRepo(opt.dataset.repo);
                });
            });
        }

        function showDropdown() { dropdown.style.display = 'block'; isOpen = true; }
        function hideDropdown() { dropdown.style.display = 'none'; isOpen = false; }

        function dimTags(repo) {
            document.querySelectorAll('.day-repos .repo-tag').forEach(function(tag) {
                tag.style.opacity = (repo && repo !== 'all' && tag.dataset.repo !== repo) ? '0.3' : '';
            });
        }

        function selectRepo(repo) {
            activeRepo = repo;
            hideDropdown();
            if (repo === 'all') {
                input.value = '';
                clearBtn.style.display = 'none';
                countEl.style.display = '';
            } else {
                input.value = repo;
                clearBtn.style.display = '';
                countEl.style.display = 'none';
            }
            filterEntries(repo);
            dimTags(repo);
            input.blur();
        }

        function filterEntries(repo) {
            document.querySelectorAll('.day-entry').forEach(function(entry) {
                if (repo === 'all' || entry.dataset.repos.split(' ').includes(repo)) {
                    entry.style.display = '';
                } else {
                    entry.style.display = 'none';
                }
            });
        }

        input.addEventListener('focus', function() { renderDropdown(input.value); });
        input.addEventListener('input', function() {
            renderDropdown(input.value);
            var q = input.value.toLowerCase();
            if (!q) {
                activeRepo = 'all';
                clearBtn.style.display = 'none';
                countEl.style.display = '';
                document.querySelectorAll('.day-entry').forEach(function(e) { e.style.display = ''; });
                dimTags('all');
            } else {
                clearBtn.style.display = '';
                countEl.style.display = 'none';
                var matches = REPO_DATA.filter(function(r) {
                    return r.name.toLowerCase().includes(q);
                });
                activeRepo = matches.length === 1 ? matches[0].name : 'all';
                document.querySelectorAll('.day-entry').forEach(function(entry) {
                    var repos = entry.dataset.repos.split(' ');
                    entry.style.display = repos.some(function(r) {
                        return r.toLowerCase().includes(q);
                    }) ? '' : 'none';
                });
                document.querySelectorAll('.day-repos .repo-tag').forEach(function(tag) {
                    tag.style.opacity = tag.dataset.repo.toLowerCase().includes(q) ? '' : '0.3';
                });
            }
        });

        clearBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            selectRepo('all');
        });

        input.addEventListener('blur', function() { setTimeout(hideDropdown, 200); });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { hideDropdown(); input.blur(); }
            if (e.key === 'Enter' && isOpen) {
                var opts = dropdown.querySelectorAll('.filter-option:not(.filter-option-all)');
                if (opts.length === 1) selectRepo(opts[0].dataset.repo);
            }
        });

        document.addEventListener('click', function(e) {
            if (!filterWrap.contains(e.target)) hideDropdown();
        });

        // Repo tags navigate to the entry page filtered by that repo
        document.querySelectorAll('.day-repos .repo-tag').forEach(function(tag) {
            tag.addEventListener('click', function(e) {
                e.preventDefault();
                var entry = tag.closest('.day-entry');
                var link = entry.querySelector('.day-link');
                window.location.href = link.href + '?repo=' + encodeURIComponent(tag.dataset.repo);
            });
        });

        // Pass repo filter when navigating to entry pages
        document.querySelectorAll('.day-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                if (activeRepo !== 'all') {
                    e.preventDefault();
                    window.location.href = link.href + '?repo=' + encodeURIComponent(activeRepo);
                }
            });
        });
    })();
    </script>
</body>
</html>
